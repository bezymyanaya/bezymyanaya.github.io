<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мое резюме</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
            transition: background-color 0.5s;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border: 2px solid #ccc;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 36px;
            text-align: center;
            text-shadow: 2px 2px 5px gray;
            color: #2c3e50;
        }

        h2 {
            font-size: 26px;
            color: #34495e;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        p, li {
            font-size: 18px;
            line-height: 1.6;
        }

        img {
            display: block;
            margin: 20px auto;
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 4px solid #3498db;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .card {
            border: 2px solid #3498db;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .card:hover {
            background-color: #ecf5ff;
            transform: scale(1.02);
        }

        input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #aaa;
            border-radius: 8px;
            width: 250px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-top: 10px;
            margin-right: 10px;
            border: none;
            border-radius: 8px;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1d6fa5;
        }

        .controls {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Мое резюме</h1>

        <img src="https://images.wallpaperscraft.ru/image/single/enot_zhivotnoe_podvodnyj_1343115_1152x864.jpg" alt="Фото">

        <div class="card">
            <h2>Личная информация</h2>
            <p><b>Имя:</b> Инзиля</p>
<p><b>Фамилия:</b> <span id="surname">Садыкова</span></p>
<p><b>Возраст:</b> 23 года</p>
<p><b>Город:</b> Москва</p>
        </div>

        <div class="card">
            <h2>О себе</h2>
            <p>Я студентка, изучаю HTML, CSS и JavaScript. Хочу научиться создавать красивые и удобные веб-страницы.</p>
        </div>

        <div class="card">
            <h2>Навыки</h2>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
                <li>Работа с GitHub</li>
            </ul>
        </div>

        <div class="card">
            <h2>Изменить фамилию</h2>
            <input type="text" id="newSurname" placeholder="Введите новую фамилию">
            <div class="controls">
                <button id="changeSurnameBtn">Изменить фамилию</button>
                <button id="changeBgBtn">Случайный фон</button>
            </div>
        </div>
    </div>

    <script>
        const surname = document.getElementById("surname");
        const newSurname = document.getElementById("newSurname");
        const changeSurnameBtn = document.getElementById("changeSurnameBtn");
        const changeBgBtn = document.getElementById("changeBgBtn");

        changeSurnameBtn.addEventListener("click", function() {
            if (newSurname.value.trim() !== "") {
                surname.textContent = newSurname.value;
            } else {
                alert("Введите фамилию");
            }
        });

        changeBgBtn.addEventListener("click", function() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            document.body.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
        });
    </script>

</body>
</html>
